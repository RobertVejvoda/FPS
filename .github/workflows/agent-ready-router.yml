name: Agent ready router

on:
  issues:
    types: [labeled, reopened]
  pull_request_target:
    types: [labeled, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agent-ready-router-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  route-copilot-issue:
    name: Route ready issue to Copilot
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issues' &&
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'ready-to-implement') &&
      contains(github.event.issue.labels.*.name, 'copilot') &&
      !contains(github.event.issue.labels.*.name, 'blocked-question')
    steps:
      - name: Assign issue to GitHub Copilot coding agent
        id: assign_copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
          FALLBACK_GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            GH_TOKEN="$FALLBACK_GH_TOKEN" gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body \
              "Automated router: Copilot routing is configured, but COPILOT_ASSIGNMENT_TOKEN is missing. GitHub requires a user token for Copilot coding agent assignment; GITHUB_TOKEN cannot assign agents."
            echo "assigned=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          payload="$(jq -n \
            --arg repo "$GH_REPO" \
            --arg base "master" \
            --arg instructions "Follow AGENTS.md and .github/copilot-instructions.md. Implement only the assigned issue scope. If a blocking ambiguity remains, stop and comment instead of widening scope." \
            '{
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: $base,
                custom_instructions: $instructions,
                custom_agent: "",
                model: ""
              }
            }')"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GH_REPO/issues/$ISSUE_NUMBER/assignees" \
            --input - <<< "$payload"

          echo "assigned=true" >> "$GITHUB_OUTPUT"

      - name: Leave routing signal
        if: steps.assign_copilot.outputs.assigned == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body \
            "Automated router: issue is labeled ready-to-implement + copilot and is not blocked, so it was assigned to GitHub Copilot coding agent."

  route-claude-issue:
    name: Prepare Claude issue handoff
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issues' &&
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'needs-claude-action') &&
      !contains(github.event.issue.labels.*.name, 'blocked-question')
    steps:
      - name: Post Claude issue handoff
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          handoff_file="$RUNNER_TEMP/claude-issue-handoff.md"
          issue_json="$RUNNER_TEMP/claude-issue-context.json"

          gh issue view "$ISSUE_NUMBER" --repo "$GH_REPO" \
            --json title,url,body,labels,comments \
            > "$issue_json"

          {
            cat <<'HANDOFF'
          Automated Claude handoff prepared. No Anthropic API call was made.

          Use this prompt only when a human decides the task is worth spending Claude tokens.

          ```text
          You are Claude acting as FPS Implementer.

          Follow AGENTS.md exactly. Keep scope narrow. Do not implement adjacent slices.
          If blocked, comment with the concrete blocker instead of widening scope.
          When finished, open or update a focused PR, report validation, and add needs-codex-review.

          HANDOFF

            jq -r '
              "## Issue\n" +
              "Title: \(.title)\n" +
              "URL: \(.url)\n" +
              "Labels: \([.labels[].name] | join(", "))\n\n" +
              "## Body\n" +
              ((.body // "") | if . == "" then "(empty)" else . end) + "\n\n" +
              "## Conversation Comments\n" +
              ((.comments // [])
                | map(select((.author.login != "github-actions") or (((.body // "") | startswith("Automated Claude handoff prepared.")) | not)))
                | map("### " + .author.login + " at " + .createdAt + "\n" + .body)
                | join("\n\n"))
            ' "$issue_json"

            printf '\n```\n'
          } > "$handoff_file"

          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body-file "$handoff_file"
          gh issue edit "$ISSUE_NUMBER" --repo "$GH_REPO" \
            --remove-label needs-claude-action \
            --add-label claude-ready

  route-claude-pr:
    name: Prepare Claude pull request handoff
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'needs-claude-action')
    steps:
      - name: Post Claude PR handoff
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          handoff_file="$RUNNER_TEMP/claude-pr-handoff.md"
          pr_json="$RUNNER_TEMP/claude-pr-context.json"
          review_comments_json="$RUNNER_TEMP/claude-pr-review-comments.json"

          gh pr view "$PR_NUMBER" --repo "$GH_REPO" \
            --json title,url,body,headRefName,baseRefName,labels,comments,reviews,files \
            > "$pr_json"

          gh api "repos/$GH_REPO/pulls/$PR_NUMBER/comments" > "$review_comments_json"

          {
            cat <<'HANDOFF'
          Automated Claude handoff prepared. No Anthropic API call was made.

          Use this prompt only when a human decides the PR repair is worth spending Claude tokens.

          ```text
          You are Claude acting as FPS Implementer.

          Follow AGENTS.md exactly.
          The PR context below is complete enough to act; do not call gh to rediscover PR comments, labels, or review state.
          Address Codex review feedback on this PR only. Keep the existing PR scope.
          Do not start a parallel implementation or unrelated refactor.
          Start by editing the changed files listed below. Use local search only when needed to understand nearby types or examples.
          For validation, use exactly: cd code/mobile/fps-mobile && npm run typecheck
          When finished, push updates to this PR branch if permitted, report validation, and add needs-codex-review.

          HANDOFF

            jq -r '
              "## Pull Request\n" +
              "Title: \(.title)\n" +
              "URL: \(.url)\n" +
              "Head: \(.headRefName)\n" +
              "Base: \(.baseRefName)\n" +
              "Labels: \([.labels[].name] | join(", "))\n\n" +
              "## PR Body\n" +
              ((.body // "") | if . == "" then "(empty)" else . end) + "\n\n" +
              "## Changed Files\n" +
              ((.files // []) | map("- " + .path) | join("\n")) + "\n\n" +
              "## Conversation Comments\n" +
              ((.comments // [])
                | map(select((.author.login != "github-actions") or (((.body // "") | startswith("Automated Claude handoff prepared.")) | not)))
                | map("### " + .author.login + " at " + .createdAt + "\n" + .body)
                | join("\n\n")) + "\n\n" +
              "## Reviews\n" +
              ((.reviews // []) | map("### " + .author.login + " " + .state + " at " + (.submittedAt // "") + "\n" + (.body // "")) | join("\n\n"))
            ' "$pr_json"

            printf '\n\n## Inline Review Comments\n'
            jq -r '
              if length == 0 then
                "(none)"
              else
                map("### " + .user.login + " on " + .path + ":" + ((.line // .original_line // 0) | tostring) + "\n" + .body) | join("\n\n")
              end
            ' "$review_comments_json"

            printf '\n```\n'
          } > "$handoff_file"

          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body-file "$handoff_file"
          gh pr edit "$PR_NUMBER" --repo "$GH_REPO" \
            --remove-label needs-claude-action \
            --add-label claude-ready
