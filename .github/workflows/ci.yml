name: CI

on:
  push:
    branches: [master]
    paths:
      - 'code/**'
      - 'tools/**'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'code/**'
      - 'tools/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    # Weekly health check (Mondays at 06:00 UTC) so SDK, dependency, and
    # environment drift is caught even when no PR is active.
    - cron: '0 6 * * 1'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore code/server/FPS.sln

      - name: Build
        run: dotnet build code/server/FPS.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test code/server/FPS.sln --no-build --configuration Release --verbosity minimal

      - name: Set up Node.js for client stale-check
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: API client stale-check
        run: ./tools/check-api-client-stale.sh

      - name: Install mobile app dependencies
        working-directory: code/mobile/fps-mobile
        run: npm ci

      - name: Mobile app typecheck
        working-directory: code/mobile/fps-mobile
        run: npm run typecheck
